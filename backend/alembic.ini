# Alembic configuration for the RAG backend.
# Run from the `backend/` directory:  alembic upgrade head
#
# The database URL is resolved at runtime in alembic/env.py from the
# DATABASE_URL environment variable (falling back to app settings), so the
# `sqlalchemy.url` below is intentionally left blank.

[alembic]
script_location = alembic

# Make the `app` package importable when running from backend/.
prepend_sys_path = .

# Use OS path separators and a UTC timestamp in generated revision filenames.
path_separator = os

# Resolved in env.py; do not hardcode credentials here.
sqlalchemy.url =


[post_write_hooks]
# (none configured)


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
