# Full local stack: Postgres + pgvector, Redis, FastAPI API (middleware + backend
# package in-process), and Vite frontend dev server.
#
# Quick start:
#   ./scripts/docker_setup.sh        # first time (build, migrate)
#   ./scripts/docker_start.sh        # later restarts
#
# Host dev (API + Vite on laptop, db/redis in Docker only):
#   ./scripts/dev_setup.sh && ./scripts/dev_start.sh

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rag_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rag_app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  middleware:
    build:
      context: .
      dockerfile: middleware/Dockerfile
    container_name: rag_app_middleware
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@db:5432/rag_app
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: backend/storage/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/backend/storage/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_app_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      middleware:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
